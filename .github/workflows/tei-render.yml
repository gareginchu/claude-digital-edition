name: Build site and assets

on: [push, pull_request]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Generate TEI drafts
      run: |
        python pipeline/generate_tei_drafts.py pipeline/articles tei
    - name: Batch render TEI to HTML
      run: |
        python site/batch_render_tei.py tei site/html site/tei_to_html.py
    - name: Build RAG index
      run: |
        python rag/create_rag_index.py tei rag/index.json
    - name: Generate IIIF manifest
      run: |
        python iiif/create_manifest.py iiif/manifests
    - name: Check outputs
      run: |
        test -d site/html || (echo 'HTML render failed' && exit 1)
        test -f rag/index.json || (echo 'RAG index failed' && exit 1)
        test -f iiif/manifests/manifest.json || (echo 'IIIF manifest failed' && exit 1)
