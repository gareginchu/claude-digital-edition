name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Rebuild corpus from PDF (ToC-aligned)
      run: |
        test -f "Babken_Chookaszian_Vol_I (2).pdf" || (echo "Source PDF missing" && exit 1)
        rm -f pipeline/articles/article_*.txt
        python -m pipeline.run_pipeline "Babken_Chookaszian_Vol_I (2).pdf"
        rm -f pipeline/backmatter/backmatter_*.txt
        python pipeline/split_back_matter.py pipeline/articles/article_056.txt pipeline/backmatter
    
    - name: Build artifacts (TEI → enrich → HTML → RAG → IIIF)
      run: |
        rm -f tei/article_*.xml
        rm -f site/html/article_*.html
        python pipeline/generate_tei_drafts.py pipeline/articles tei
        python pipeline/enrich_tei.py tei tei_enriched --start-article 1 --end-article 55
        python site/batch_render_tei.py tei_enriched site/html site/tei_to_html.py
        python rag/create_rag_index.py tei rag/index.json
        # IIIF manifest is regenerated only when local tile output exists;
        # otherwise CI keeps the committed manifest.json (references
        # placeholder https://REPLACE-ME.example.org/iiif/... URLs — rights
        # guardrail: plate bytes never enter CI).
        if [ -d iiif/tiles ] && [ -f iiif/pages/captions.json ]; then
          python iiif/create_manifest.py --out iiif/manifests
        else
          echo "iiif/tiles or iiif/pages/captions.json absent; keeping committed manifest.json"
        fi
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Build Astro site
      run: |
        cd site
        npm install
        npm run build
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site/dist
