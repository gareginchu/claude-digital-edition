<h2>Article 560</h2>
<p>ԼՈՒՍԱՆԿԱՐՆԵՐ ԵՒ ՄԱՆՐԱՆԿԱՐՆԵՐ 

XIII 

22. 

 Բաբկէն Չուգասզեանը եւ Ամենայն հայոց հայրապէտ Վազգէն Ա-ն, Երեւան, 1980-ական 
թւականների սկիզբ, լուսանկարը Ս․ Ագրամանեանի</p>
